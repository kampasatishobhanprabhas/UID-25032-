<!DOCTYPE html>
<html>
    <head>
        <title>forms.html</title>
    </head>
    <body>
        <form>
            <h3 style="text-align: center;">College Admission Register</h3>
            <table border="2" style="text-align: center;border-collapse: collapse;padding: 5px;;" align="center">
                <tr>
                    <td><label for="fn">Full Name : </label></td>
                    <td><input type="text" id="fn" size="20"></td>
                </tr>
                <tr>
                    <td><label>Email : </label></td>
                    <td><input type="text" size=20 placeholder="shobhanprabhas@gmail.com"></td>
                </tr>
                <tr>
                    <td><label>Phone Number : </label></td>
                    <td><input type="number" maxlength="11"></td>
                </tr>
                <tr>
                    <td><label>Gender : </label></td>
                    <td><input type="radio" name="gender">Male
                        <input type="radio" name="gender">Female
                        <input type="radio" name="gender">Other</td>
                </tr>
                <t>
                    <td><label>Course Applying For : </label></td>
                    <td><select name="B.tech">
                        <option>B.tech</option>
                        <option>Degree</option>
                        <option>MBA</option>
                    </select></td>
                <tr>
                    <td><label>Hobbies : </label></td>
                    <td><input type="checkbox" name="=Activities">Sports
                        <input type="checkbox" name="Activities">Music
                        <input type="checkbox" name="Activities">Reading</td>
                </tr>
                <tr>
                    <td><label>Date Of Birth : </label></td>
                    <td><input type="date" name="date" max="12-01-2026" min="12-01-2025"></td>
                </tr>
                <tr>
                    <td><label>Upload Certificate : </label></td>
                    <td><input type="file" multiple></td>
                </tr>
                <tr>
                    <td><label>Address : </label></td>
                    <td><textarea rows="5" cols="7"></textarea></td>
                </tr>
                <tr>
                    <td colspan="2" style="text-align: center;"><input type="submit" value="submit"><input type="reset" value="reset"></td>
                    
                </tr>
                      
                </tr>
            </table>
        </form>
    </body>
</html>
