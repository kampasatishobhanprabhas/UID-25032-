<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>User login</title>
    <style>
        table,th,td{
            border: 2px solid black;
            border-collapse: collapse;
            th,td{
                background-color: rgb(252, 255, 254);
            }
        }
    </style>
</head>
<body>
    <h1 align="center">User Login</h1>
    <form>
        <table width="500" align="center">
            <tr>
                <td><label for="uname">Username:</label></td>
                <td><input type="text" id="uname" name="uname" placeholder="Username"></td>
            </tr>
            <tr>  <td><label for="pass">Password:</label></td>
                <td><input type="text" name="pass" id="pass" placeholder="Enter your password"></td>
            </tr>
            <tr>
                <td colspan="2" align="center"><input type="button" value="login" onclick="alert('login succesful')"></td>
            </tr>
        
        </table>

    </form>
    
    
</body>
</html>
